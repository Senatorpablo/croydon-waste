<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Where Croydon's Waste Goes — Globe</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a1f17;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; font-family: 'Inter', -apple-system, sans-serif;
    overflow: hidden;
  }
  .wrapper {
    display: flex; flex-direction: column; align-items: center;
    gap: 30px; color: #f8f5ed;
  }
  .headline {
    font-family: 'Fraunces', Georgia, serif;
    font-size: clamp(28px, 4vw, 48px);
    font-style: italic; font-weight: 400;
    letter-spacing: -0.02em; text-align: center;
  }
  .headline em { color: #d4ed7e; font-style: normal; }
  .globe-container { position: relative; }
  svg { cursor: grab; }
  svg:active { cursor: grabbing; }
  .stats {
    display: flex; gap: 50px; flex-wrap: wrap; justify-content: center;
    font-family: 'Fraunces', Georgia, serif;
  }
  .stat { text-align: center; }
  .stat-num { font-size: 42px; color: #d4ed7e; font-style: italic; }
  .stat-label { font-size: 12px; color: rgba(248,245,237,0.6); text-transform: uppercase; letter-spacing: 0.12em; margin-top: 4px; }
</style>
</head>
<body>
<div class="wrapper">
  <div class="headline">
    Where <em>Croydon's waste</em> goes
  </div>
  <div class="globe-container">
    <svg id="globe"></svg>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-num">94%</div><div class="stat-label">Diverted from landfill</div></div>
    <div class="stat"><div class="stat-num">12</div><div class="stat-label">Recycling partners</div></div>
    <div class="stat"><div class="stat-num">6</div><div class="stat-label">Continents reached</div></div>
  </div>
</div>

<script>
(async () => {
  const svg = d3.select("#globe");
  const width = Math.min(window.innerWidth * 0.85, 700);
  const height = width;

  svg.attr("width", width).attr("height", height);

  // ── Defs for glow ────────────────────────────────────
  const defs = svg.append("defs");
  const glowFilter = defs.append("filter").attr("id", "arcGlow");
  glowFilter.append("feGaussianBlur").attr("stdDeviation", "3").attr("result", "blur");
  glowFilter.append("feMerge")
    .selectAll("feMergeNode").data(["blur", "SourceGraphic"])
    .enter().append("feMergeNode").attr("in", d => d);

  const atmFilter = defs.append("filter").attr("id", "atmosphere");
  atmFilter.append("feGaussianBlur").attr("stdDeviation", "18");

  const atmGrad = defs.append("radialGradient").attr("id", "atmGrad");
  atmGrad.append("stop").attr("offset", "0%").attr("stop-color", "#d4ed7e").attr("stop-opacity", 0.25);
  atmGrad.append("stop").attr("offset", "60%").attr("stop-color", "#1a6b52").attr("stop-opacity", 0.08);
  atmGrad.append("stop").attr("offset", "100%").attr("stop-color", "#0a1f17").attr("stop-opacity", 0);

  // ── Projection ───────────────────────────────────────
  const cx = width / 2, cy = height / 2;
  const projection = d3.geoOrthographic()
    .scale(width * 0.35)
    .translate([cx, cy])
    .rotate([-0.1, -51.3, 0]);

  const path = d3.geoPath(projection);

  // ── Atmosphere glow ──────────────────────────────────
  svg.append("circle")
    .attr("cx", cx).attr("cy", cy)
    .attr("r", width * 0.38)
    .attr("fill", "url(#atmGrad)")
    .attr("filter", "url(#atmosphere)");

  // ── Globe sphere ─────────────────────────────────────
  svg.append("circle")
    .attr("cx", cx).attr("cy", cy)
    .attr("r", projection.scale())
    .attr("fill", "#0f2a20")
    .attr("stroke", "rgba(212,237,126,0.15)")
    .attr("stroke-width", 1);

  // ── Land ─────────────────────────────────────────────
  const world = await d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json");
  const land = topojson.feature(world, world.objects.land);

  const landPath = svg.append("path")
    .datum(land)
    .attr("fill", "#153a2b")
    .attr("stroke", "rgba(212,237,126,0.08)")
    .attr("stroke-width", 0.5);

  // ── Graticule ────────────────────────────────────────
  const graticule = d3.geoGraticule();
  svg.append("path")
    .datum(graticule)
    .attr("fill", "none")
    .attr("stroke", "rgba(212,237,126,0.05)")
    .attr("stroke-width", 0.3);

  // ── Cities ───────────────────────────────────────────
  const cities = [
    { name: "Croydon", lat: 51.376, lng: -0.098 },
    { name: "Purfleet", lat: 51.487, lng: 0.237 },
    { name: "Brentford", lat: 51.487, lng: -0.306 },
    { name: "Rotterdam", lat: 51.924, lng: 4.478 },
    { name: "Antwerp", lat: 51.219, lng: 4.402 },
    { name: "Hamburg", lat: 53.551, lng: 9.994 },
    { name: "Oslo", lat: 59.914, lng: 10.752 },
    { name: "Barcelona", lat: 41.387, lng: 2.169 },
    { name: "Mumbai", lat: 19.076, lng: 72.877 },
    { name: "Shanghai", lat: 31.230, lng: 121.474 },
    { name: "Singapore", lat: 1.352, lng: 103.820 },
    { name: "Lagos", lat: 6.524, lng: 3.379 },
    { name: "São Paulo", lat: -23.551, lng: -46.633 },
    { name: "New York", lat: 40.713, lng: -74.006 },
  ];

  // ── Routes (Croydon → recycling partners) ────────────
  const routes = [
    ["Croydon", "Purfleet"], ["Croydon", "Brentford"],
    ["Croydon", "Rotterdam"], ["Croydon", "Antwerp"],
    ["Croydon", "Hamburg"], ["Purfleet", "Rotterdam"],
    ["Rotterdam", "Hamburg"], ["Antwerp", "Barcelona"],
    ["Rotterdam", "Mumbai"], ["Hamburg", "Shanghai"],
    ["Barcelona", "Lagos"], ["New York", "São Paulo"],
    ["Singapore", "Shanghai"],
  ];

  const cityMap = Object.fromEntries(cities.map(c => [c.name, c]));

  // ── Arc paths ────────────────────────────────────────
  const arcGroup = svg.append("g").attr("filter", "url(#arcGlow)");

  function drawArcs() {
    arcGroup.selectAll("*").remove();
    routes.forEach(([from, to]) => {
      const a = cityMap[from], b = cityMap[to];
      if (!a || !b) return;
      const interp = d3.geoInterpolate([a.lng, a.lat], [b.lng, b.lat]);
      const pts = d3.range(0, 1.01, 0.02).map(t => projection(interp(t)));
      const line = d3.line().curve(d3.curveCardinal.tension(0.3));
      arcGroup.append("path")
        .attr("d", line(pts))
        .attr("fill", "none")
        .attr("stroke", "#d4ed7e")
        .attr("stroke-width", 1)
        .attr("stroke-opacity", 0.35);
    });
  }

  // ── Pulse dots on arcs ───────────────────────────────
  const pulseGroup = svg.append("g");
  const pulses = [];

  routes.forEach(([from, to], i) => {
    const a = cityMap[from], b = cityMap[to];
    if (!a || !b) return;
    const interp = d3.geoInterpolate([a.lng, a.lat], [b.lng, b.lat]);
    pulses.push({
      interp, progress: Math.random(), speed: 0.0015 + Math.random() * 0.003,
      node: pulseGroup.append("circle").attr("r", 1.8).attr("fill", "#f8f5ed")
    });
  });

  function animatePulses() {
    pulses.forEach(p => {
      p.progress += p.speed;
      if (p.progress > 1) p.progress = 0;
      const [px, py] = projection(p.interp(p.progress)) || [0, 0];
      p.node.attr("cx", px).attr("cy", py);
      // Hide if behind globe
      const [cityLng, cityLat] = p.interp(p.progress);
      const isVisible = d3.geoDistance(
        [cityLng, cityLat],
        projection.invert([cx, cy])
      ) < Math.PI / 2;
      p.node.attr("opacity", isVisible ? 0.9 : 0);
    });
  }

  // ── City nodes ───────────────────────────────────────
  const cityGroup = svg.append("g");
  function drawCities() {
    cityGroup.selectAll("*").remove();
    cities.forEach(c => {
      const [x, y] = projection([c.lng, c.lat]) || [0, 0];
      const isVisible = d3.geoDistance(
        [c.lng, c.lat],
        projection.invert([cx, cy])
      ) < Math.PI / 2;

      if (!isVisible) return;

      const isCroydon = c.name === "Croydon";

      cityGroup.append("circle")
        .attr("cx", x).attr("cy", y)
        .attr("r", isCroydon ? 4.5 : 2.5)
        .attr("fill", isCroydon ? "#b8e34a" : "#d4ed7e")
        .attr("stroke", "#0a1f17")
        .attr("stroke-width", 1)
        .attr("opacity", isCroydon ? 1 : 0.7);

      cityGroup.append("text")
        .attr("x", x + 8).attr("y", y + 4)
        .attr("fill", "#f8f5ed")
        .attr("font-size", isCroydon ? 11 : 9)
        .attr("font-family", "'Inter', sans-serif")
        .attr("font-weight", isCroydon ? 700 : 400)
        .attr("opacity", isCroydon ? 1 : 0.6)
        .text(c.name);
    });
  }

  // ── Render ───────────────────────────────────────────
  function render() {
    landPath.attr("d", path);
    svg.selectAll(".graticule").attr("d", path);
    drawArcs();
    drawCities();
  }

  // ── Drag to rotate ───────────────────────────────────
  let lastLambda = -0.1, lastPhi = -51.3;
  svg.call(d3.drag()
    .on("start", () => { svg.style("cursor", "grabbing"); })
    .on("drag", (event) => {
      const dx = event.dx * 0.3, dy = event.dy * 0.3;
      lastLambda += dx; lastPhi -= dy;
      if (lastPhi > 90) lastPhi = 90;
      if (lastPhi < -90) lastPhi = -90;
      projection.rotate([lastLambda, lastPhi]);
      render();
    })
    .on("end", () => { svg.style("cursor", "grab"); })
  );

  // ── Auto-rotate ──────────────────────────────────────
  function autoRotate() {
    lastLambda -= 0.08;
    projection.rotate([lastLambda, lastPhi]);
    render();
    animatePulses();
    requestAnimationFrame(autoRotate);
  }

  render();
  autoRotate();
})();
</script>
</body>
</html>
